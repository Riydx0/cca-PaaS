services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cca_paas
      POSTGRES_USER: cca
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cca -d cca_paas"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgresql://cca:${DB_PASSWORD:-changeme}@db:5432/cca_paas
      SESSION_SECRET: ${SESSION_SECRET}
      APP_URL: ${APP_URL:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      GITHUB_RAW_VERSION_URL: ${GITHUB_RAW_VERSION_URL:-}
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-cca-paas}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace
      - uploads_data:/app/artifacts/api-server/public/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-net

  frontend:
    build:
      context: .
      target: frontend
    restart: unless-stopped
    ports:
      - "${LISTEN_PORT:-80}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /etc/cloudflare-ssl:/etc/cloudflare-ssl:ro
    depends_on:
      - api
    networks:
      - app-net

volumes:
  pgdata:
  uploads_data:

networks:
  app-net:

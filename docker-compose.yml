services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cca_paas
      POSTGRES_USER: cca
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cca -d cca_paas"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgresql://cca:${DB_PASSWORD:-changeme}@db:5432/cca_paas
      SESSION_SECRET: ${SESSION_SECRET}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-net

  frontend:
    build:
      context: .
      target: frontend
      args:
        VITE_CLERK_PROXY_URL: ${VITE_CLERK_PROXY_URL:-""}
    restart: unless-stopped
    ports:
      - "${LISTEN_PORT:-80}:80"
    depends_on:
      - api
    networks:
      - app-net

volumes:
  pgdata:

networks:
  app-net:
